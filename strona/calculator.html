<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>The Convergence Wiki - Rune Calculator</title>
    <style>
        body { margin: 0; background-color: #2a2e33; color: #e0e0e0; font-family: 'Segoe UI', serif; }
        .wrapper { display: flex; }
        
        /* SIDEBAR */
        .sidebar { width: 250px; height: 100vh; background-color: #010541; position: fixed; padding: 40px 20px; display: flex; flex-direction: column; box-sizing: border-box; }
        .nav-list { list-style: none; padding: 0; flex-grow: 1; }
        .nav-item { margin-bottom: 15px; color: #888; text-decoration: none; display: block; }
        .nav-item.active { color: #4a90e2; font-weight: bold; }
        
        /* STYL BACK BUTTON */
        .back-button { background: transparent; color: #4a90e2; border: 1px solid #4a90e2; padding: 10px; cursor: pointer; margin-top: auto; text-transform: uppercase; }

        /* MAIN */
        .main-content { margin-left: 250px; padding: 40px; flex-grow: 1; }
        
        .calc-table { width: 100%; max-width: 900px; border-collapse: collapse; background: #1e2124; margin: 0 auto; }
        .calc-table th { background: #010541; color: #4a90e2; padding: 15px; text-align: left; text-transform: uppercase; font-size: 0.8rem; border-bottom: 2px solid #4a90e2; }
        .calc-table td { padding: 10px 15px; border-bottom: 1px solid #3d4248; font-size: 0.9rem; }

        .row-total { color: #4a90e2; font-weight: bold; text-align: right; }
        
        .summary-box {
            max-width: 900px;
            margin: 30px auto;
            background: #010541;
            padding: 20px;
            border: 1px solid #4a90e2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .grand-total { font-size: 2rem; color: white; font-weight: bold; }
        .label { text-transform: uppercase; letter-spacing: 1px; color: #4a90e2; }

        .category-label { background: #252a30; color: #888; font-weight: bold; font-size: 0.7rem; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="wrapper">
    <nav class="sidebar">
        <h1>The Convergence wiki</h1>
        <div class="nav-list">
            <a href="classes.html" class="nav-item">Classes</a>
            <a href="upgrade_materials.html" class="nav-item">Upgrade Materials</a>
            <a href="#" class="nav-item active">Calculator</a>
        </div>
        <button class="back-button" onclick="goBack()">Back</button>
    </nav>

    <main class="main-content">
        <h2 style="text-align: center; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 40px;">Rune Cost Calculator</h2>
        
        <table class="calc-table">
            <thead>
                <tr>
                    <th>Material Name</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th style="text-align: right;">Subtotal</th>
                </tr>
            </thead>
            <tbody id="calcBody">
            </tbody>
        </table>

        <div class="summary-box">
            <span class="label">Total Runes Required:</span>
            <span class="grand-total" id="grandTotal">0</span>
        </div>
    </main>
</div>

<script>
    function goBack() {
        window.location.href = "main page.html";
    }

    const materials = [
        // STANDARD
        { name: "Smithing Stone [1]", price: 300, cat: "Standard" },
        { name: "Smithing Stone [2]", price: 600, cat: "Standard" },
        { name: "Smithing Stone [3]", price: 1200, cat: "Standard" },
        { name: "Ancient Smithing Stone", price: 5000, cat: "Standard" },
        
        // SOMBER
        { name: "Somber Stone [1]", price: 1000, cat: "Somber" },
        { name: "Somber Stone [2]", price: 1500, cat: "Somber" },
        { name: "Somber Stone [3]", price: 2500, cat: "Somber" },
        { name: "Somber Stone [4]", price: 5000, cat: "Somber" },
        { name: "Somber Ancient Stone", price: 7500, cat: "Somber" },

        // SHADOW
        { name: "Shadow Stone [1]", price: 5000, cat: "Shadow" },
        { name: "Large Shadow Stone", price: 7500, cat: "Shadow" },
        { name: "Great Shadow Stone", price: 8500, cat: "Shadow" },
        { name: "Monstrous Shadow Stone", price: 9000, cat: "Shadow" },
        { name: "Primordial Shadow Stone", price: 10000, cat: "Shadow" },

        // SOMBER SHADOW
        { name: "Somber Shadow Stone", price: 7500, cat: "Somber Shadow" },
        { name: "Large Somber Shadow Stone", price: 9000, cat: "Somber Shadow" },
        { name: "Monstrous Somber Shadow Stone", price: 11500, cat: "Somber Shadow" },
        { name: "Primordial Somber Shadow Stone", price: 12500, cat: "Somber Shadow" }
    ];

    const tbody = document.getElementById('calcBody');
    let currentCat = "";

    materials.forEach((m, index) => {
        if (m.cat !== currentCat) {
            currentCat = m.cat;
            const catRow = document.createElement('tr');
            catRow.innerHTML = `<td colspan="4" class="category-label">${currentCat} Materials</td>`;
            tbody.appendChild(catRow);
        }

        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${m.name}</td>
            <td style="color: #666;">${m.price.toLocaleString()}</td>
            <td><input type="number" id="input-${index}" class="item-input" placeholder="0" oninput="updateTotal()"></td>
            <td class="row-total" id="total-${index}">0</td>
        `;
        tbody.appendChild(tr);
    });

    function updateTotal() {
        let grandTotal = 0;
        materials.forEach((m, index) => {
            const qty = document.getElementById(`input-${index}`).value || 0;
            const cost = qty * m.price;
            document.getElementById(`total-${index}`).innerText = cost.toLocaleString();
            grandTotal += cost;
        });
        document.getElementById('grandTotal').innerText = grandTotal.toLocaleString();
    }
</script>

</body>
</html>
